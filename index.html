<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>BusinessFD</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="Screenshot%202026-05-15%20141141.png">

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f4f1ec;
            color:#1c1c1c;
            font-family:'Inter', sans-serif;
            min-height:100vh;
            overflow-x:hidden;
            letter-spacing:-0.2px;
        }

        .page{
            width:100%;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            padding:45px 55px 25px 55px;
        }

        .hero{
            max-width:1100px;
            margin-top:40px;
        }

        h1{
            font-family:'Lora', serif;
            font-size:110px;
            font-weight:400;
            line-height:1;
            letter-spacing:-4px;
            margin-bottom:40px;
            color:#1c1c1c;
        }

        .gold{
            color:#c19a2b;
        }

        .subtitle{
            font-size:34px;
            line-height:1.35;
            color:#2e2e2e;
            max-width:950px;
            margin-bottom:18px;
            font-weight:300;
        }

        .tagline{
            color:#c19a2b;
            font-size:23px;
            font-weight:400;
            letter-spacing:0.2px;
        }

        .contact{
            margin-top:90px;
            max-width:900px;
        }

        .line{
            width:45px;
            height:3px;
            background:#c19a2b;
            margin-bottom:30px;
        }

        .contact p{
            font-size:24px;
            line-height:1.8;
            color:#2a2a2a;
            font-weight:300;
        }

        .email-inline a{
            color:#c19a2b;
            text-decoration:none;
            margin-left:8px;
            transition:0.3s;
        }

        .email-inline a:hover{
            opacity:0.75;
        }

        footer{
            margin-top:70px;
            padding-top:25px;
            border-top:1px solid #d8d2c8;
            font-size:13px;
            color:#777777;
            letter-spacing:0.4px;
        }

        @media(max-width:900px){

            .page{
                padding:35px 25px 20px 25px;
            }

            .hero{
                margin-top:20px;
            }

            h1{
                font-size:72px;
                letter-spacing:-2px;
                margin-bottom:25px;
            }

            .subtitle{
                font-size:24px;
                margin-bottom:14px;
            }

            .tagline{
                font-size:18px;
                line-height:1.6;
            }

            .contact{
                margin-top:70px;
            }

            .contact p{
                font-size:19px;
                line-height:1.7;
            }

            .email-inline a{
                display:block;
                margin-left:0;
                margin-top:10px;
                word-break:break-word;
            }

            footer{
                font-size:11px;
                line-height:1.8;
                margin-top:50px;
            }
        }

    </style>
</head>
